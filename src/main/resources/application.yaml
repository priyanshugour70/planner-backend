server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: planner-backend

  # AUTO_SERVER=TRUE: DevTools / second JVM can share this file (H2 embedded TCP).
  # Note: cannot combine AUTO_SERVER with DB_CLOSE_ON_EXIT=FALSE on H2 2.3+.
  datasource:
    url: jdbc:h2:file:./data/plannerdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          time_zone: Asia/Kolkata
        order_inserts: true
        order_updates: true
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  cache:
    type: simple

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

app:
  timezone: Asia/Kolkata
  jwt:
    secret: ${JWT_SECRET:plannerAppSecretKeyForJWTTokenGeneration2024SecureRandomString}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:86400000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.planner: DEBUG
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
