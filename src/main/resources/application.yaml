server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: planner-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:planner_db}
    username: ${DB_USERNAME:priyanshugour}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
          time_zone: Asia/Kolkata
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: simple

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

app:
  timezone: Asia/Kolkata
  jwt:
    secret: ${JWT_SECRET:plannerAppSecretKeyForJWTTokenGeneration2024SecureRandomString}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:86400000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.planner: DEBUG
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
