server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: planner-backend

  # Default: Supabase PostgreSQL (postgres) + optional local secrets (local). Tests use profile "test" only.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:postgres,local}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50
          time_zone: Asia/Kolkata
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: false

  cache:
    type: simple

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:priyanshugour1@gmail.com}
    password: ${MAIL_PASSWORD:aymx newu phks wudr}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        transport:
          protocol: smtp

app:
  timezone: Asia/Kolkata
  jwt:
    secret: ${JWT_SECRET:plannerAppSecretKeyForJWTTokenGeneration2024SecureRandomString}
    access-token-expiry: ${JWT_ACCESS_EXPIRY:86400000}
    refresh-token-expiry: ${JWT_REFRESH_EXPIRY:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    root: INFO
    com.planner: DEBUG
    org.hibernate.SQL: INFO
    org.springframework.security: INFO
