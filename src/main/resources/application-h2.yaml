# Optional local file DB: SPRING_PROFILES_ACTIVE=h2,local
spring:
  datasource:
    url: jdbc:h2:file:./data/plannerdb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
